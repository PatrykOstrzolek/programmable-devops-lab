name: SSH connectivity check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ssh-check:
    name: Check SSH access
    runs-on: ubuntu-latest

    steps:
      - name: Check SSH connection
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          test -n "$SSH_HOST" || { echo "SSH_HOST is not configured" >&2; exit 1; }
          test -n "$SSH_USER" || { echo "SSH_USER is not configured" >&2; exit 1; }
          test -n "$SSH_PRIVATE_KEY" || { echo "SSH_PRIVATE_KEY is not configured" >&2; exit 1; }

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

          ssh-keyscan -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$SSH_USER@$SSH_HOST" \
            'hostname && whoami'
